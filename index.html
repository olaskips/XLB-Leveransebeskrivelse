<style>

    --gold: #C9A84C; --black: #111111; --off-white: #F7F6F3;

  header { background: var(--black); padding: 18px 32px; border-bottom: 3px solid var(--gold); }
  header .logo-text { color: var(--gold); font-size: 20px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; }
  header .logo-sub { color: var(--gray-2); font-size: 13px; letter-spacing: 0.06em; text-transform: uppercase; margin-top: 2px; }
  main { max-width: 820px; margin: 0 auto; padding: 36px 24px 60px; }
  .card { background: white; border-radius: var(--radius); border: 1px solid var(--gray-2); overflow: hidden; margin-bottom: 20px; }
  .card-header { background: var(--black); color: var(--gold); font-size: 11px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 20px; }
  .card-body { padding: 20px; }
  .upload-zone { border: 2px dashed var(--gray-2); border-radius: var(--radius); padding: 40px 20px; text-align: center; cursor: pointer; transition: border-color 0.15s, background 0.15s; background: var(--off-white); }
  .upload-zone:hover, .upload-zone.drag-over { border-color: var(--gold); background: #FBF8EF; }
  .upload-zone.done { border-color: #4A8C5C; background: #F0F7F2; cursor: default; }
  .upload-zone input { display: none; }
  .upload-icon { font-size: 32px; margin-bottom: 10px; display: block; }
  .upload-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
  .upload-sub { font-size: 13px; color: var(--gray-3); }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .form-field label { display: block; font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; color: var(--gray-3); margin-bottom: 6px; }
  .form-field input { width: 100%; padding: 9px 12px; border: 1px solid var(--gray-2); border-radius: var(--radius); font-size: 14px; font-family: inherit; color: var(--text); background: var(--off-white); transition: border-color 0.15s; outline: none; }
  .form-field input:focus { border-color: var(--gold); background: white; }
  .btn-primary { width: 100%; padding: 13px 20px; background: var(--black); color: var(--gold); border: none; border-radius: var(--radius); font-size: 14px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; cursor: pointer; transition: background 0.15s, color 0.15s; margin-top: 16px; }
  .btn-primary:hover:not(:disabled) { background: var(--gold); color: var(--black); }
  .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
  .btn-secondary { padding: 8px 16px; background: transparent; color: var(--text); border: 1px solid var(--gray-2); border-radius: var(--radius); font-size: 13px; font-weight: 600; cursor: pointer; transition: border-color 0.15s, background 0.15s; }
  .btn-secondary:hover { border-color: var(--gold); background: #FBF8EF; }
  .btn-download { padding: 10px 20px; background: var(--gold); color: var(--black); border: none; border-radius: var(--radius); font-size: 13px; font-weight: 700; cursor: pointer; transition: background 0.15s; }
  .btn-download:hover { background: #b8902e; }
  .status { display: none; padding: 12px 16px; border-radius: var(--radius); font-size: 13px; margin-top: 12px; }
  .status.loading { display: block; background: #EEF3FF; color: #3355AA; border: 1px solid #C0CFEE; }
  .status.error { display: block; background: #FFF0F0; color: #AA2222; border: 1px solid #EECCCC; }

  .result-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
  .result-toolbar span { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--gray-3); }

<script>
const WORKER_URL = 'https://xlb-leveranse-proxy.olas.workers.dev';
let parsedRows = null;
let lastGeneratedText = '';
let lastProjectInfo = {};

const uploadZone = document.getElementById('uploadZone');
const fileInput = document.getElementById('fileInput');
uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => { e.preventDefault(); uploadZone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      parsedRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });
      uploadZone.classList.add('done');
      uploadZone.innerHTML = '<span class="upload-icon">&#9989;</span><div class="upload-title">' + file.name + '</div><div class="upload-sub">' + parsedRows.length + ' rader lest</div>';
      const today = new Date();
      document.getElementById('projectDate').value = String(today.getDate()).padStart(2,'0') + '.' + String(today.getMonth()+1).padStart(2,'0') + '.' + today.getFullYear();
      const nameGuess = file.name.replace(/\.[^/.]+$/, '').replace(/[_]/g, ' ').replace(/\s*\d{4}[\s._-]\d{2}[\s._-]\d{2}.*/,'').trim();
      document.getElementById('projectName').value = nameGuess;
      document.getElementById('formCard').style.display = 'block';
      document.getElementById('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch(err) { showStatus('Kunne ikke lese filen.', 'error'); }
  };
  reader.readAsArrayBuffer(file);
}

function buildExcelSummary(rows) {
  const lines = [];
  for (const row of rows) {
    const c0 = String(row[0]||'').trim();
    const c1 = String(row[1]||'').trim();
    const c2 = String(row[2]||'').trim();
    const qty = row[3];
    const unit = String(row[4]||'').trim();
    if (!c0 && !c1) continue;
    if (/^\d+\./.test(c0) && !qty) { lines.push('\n[' + c0 + ']'); continue; }
    if (!c0 && /^\d+\./.test(c1) && !qty) { lines.push('\n[' + c1 + ']'); continue; }
    if (!c0 && c1 && (qty === '' || qty === undefined)) { lines.push('  (' + c1 + ')'); continue; }
    if (c1 && qty !== '' && qty !== undefined) { lines.push('  ' + c1 + (c2 ? ' '+c2 : '') + ': ' + qty + ' ' + unit); }
  }
  return lines.join('\n');
}

document.getElementById('generateBtn').addEventListener('click', async () => {
  if (!parsedRows) return;
  const project = document.getElementById('projectName').value || 'Ukjent prosjekt';
  const customer = document.getElementById('customerName').value || '–';
  const date = document.getElementById('projectDate').value || '';
  const seller = document.getElementById('sellerName').value || '–';
  lastProjectInfo = { project, customer, date, seller };

  const prompt = 'Du skal lage en leveransebeskrivelse for byggsett på norsk bokmål basert på en Smartkalk-materialliste.\n\n' +
    'PROSJEKT: ' + project + '\nKUNDE: ' + customer + '\nDATO: ' + date + '\nSELGER: ' + seller + '\n\n' +
    'MATERIALLISTE FRA SMARTKALK:\n' + buildExcelSummary(parsedRows) + '\n\n' + PROMPT_EXAMPLE;

  setLoading(true);
  showStatus('Genererer leveransebeskrivelse — dette tar ca. 20–30 sekunder...', 'loading');
  document.getElementById('resultArea').style.display = 'none';

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });
    if (!response.ok) throw new Error('HTTP ' + response.status);
    const data = await response.json();
    const text = data.content && data.content[0] && data.content[0].text;
    if (!text) throw new Error('Tomt svar fra AI');
    lastGeneratedText = text;
    renderResult(text);
    hideStatus();
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });
  } catch(err) {
    showStatus('Noe gikk galt: ' + err.message, 'error');
  }
  setLoading(false);
});

function renderResult(text) {
  const formatted = text
    .replace(/^#{1,6}\s*/gm, '')
    .replace(/^-{3,}\s*$/gm, '')
    .replace(/\*{3}(.+?)\*{3}/g, function(_, m) { return m.toUpperCase(); })
    .replace(/\*\*(.+?)\*\*/g, function(_, m) { return '\n' + m.toUpperCase() + '\n' + '─'.repeat(Math.min(m.length+2,50)) + '\n'; })
    .replace(/^- /gm, '– ')
    .replace(/\n{3,}/g, '\n\n')
    .trim();
  document.getElementById('resultContent').textContent = formatted;
}

document.getElementById('copyBtn').addEventListener('click', () => {
  navigator.clipboard.writeText(document.getElementById('resultContent').textContent).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Kopiert!';
    setTimeout(() => btn.textContent = 'Kopier tekst', 2000);
  });
});

document.getElementById('downloadBtn').addEventListener('click', async () => {
  if (!lastGeneratedText) return;
  const btn = document.getElementById('downloadBtn');
  btn.textContent = 'Bygger dokument...';
  btn.disabled = true;
  try { await generateWordDoc(lastGeneratedText, lastProjectInfo); }
  catch(err) { alert('Feil ved Word-generering: ' + err.message); }
  btn.innerHTML = '&#11015; Last ned Word (.docx)';
  btn.disabled = false;
});

async function generateWordDoc(text, info) {
  const D = docx;
  const GOLD = 'C9A84C';
  const BLACK = '111111';
  const CONTENT_W = 9638;
  const borderThin = { style: D.BorderStyle.SINGLE, size: 4, color: 'D0CEC8' };
  const borders = { top: borderThin, bottom: borderThin, left: borderThin, right: borderThin };
  const noBorders = { top: {style: D.BorderStyle.NONE}, bottom: {style: D.BorderStyle.NONE}, left: {style: D.BorderStyle.NONE}, right: {style: D.BorderStyle.NONE} };
  const cm = { top: 80, bottom: 80, left: 120, right: 120 };

  function heading(t) {
    return new D.Paragraph({
      spacing: { before: 280, after: 80 },
      border: { bottom: { style: D.BorderStyle.SINGLE, size: 8, color: GOLD, space: 4 } },
      children: [new D.TextRun({ text: t, bold: true, size: 24, font: 'Arial', color: BLACK })]
    });
  }
  function bullet(t) {
    return new D.Paragraph({
      numbering: { reference: 'bullets', level: 0 },
      spacing: { before: 40, after: 40 },
      children: [new D.TextRun({ text: t, font: 'Arial', size: 20, color: BLACK })]
    });
  }
  function optionHeading(t) {
    return new D.Paragraph({
      spacing: { before: 160, after: 60 },
      children: [new D.TextRun({ text: t, bold: true, italics: true, size: 20, font: 'Arial', color: BLACK })]
    });
  }
  function spacer() {
    return new D.Paragraph({ spacing: { before: 60, after: 60 }, children: [new D.TextRun('')] });
  }
  function tableRow(c1, c2, c3, isHeader) {
    const shade = isHeader ? { fill: '1A1A1A', type: D.ShadingType.CLEAR } : { fill: 'FFFFFF', type: D.ShadingType.CLEAR };
    const tc = isHeader ? GOLD : BLACK;
    return new D.TableRow({ children: [
      new D.TableCell({ borders: borders, margins: cm, width: { size: Math.round(CONTENT_W*0.55), type: D.WidthType.DXA }, shading: shade,
        children: [new D.Paragraph({ children: [new D.TextRun({ text: c1, font: 'Arial', size: 18, bold: !!isHeader, color: tc })] })] }),
      new D.TableCell({ borders: borders, margins: cm, width: { size: Math.round(CONTENT_W*0.225), type: D.WidthType.DXA }, shading: shade,
        children: [new D.Paragraph({ alignment: D.AlignmentType.CENTER, children: [new D.TextRun({ text: c2, font: 'Arial', size: 18, bold: !!isHeader, color: tc })] })] }),
      new D.TableCell({ borders: borders, margins: cm, width: { size: Math.round(CONTENT_W*0.225), type: D.WidthType.DXA }, shading: shade,
        children: [new D.Paragraph({ alignment: D.AlignmentType.CENTER, children: [new D.TextRun({ text: c3, font: 'Arial', size: 18, bold: !!isHeader, color: tc })] })] }),
    ]});
  }

  const sections = parseTextToSections(text);

  const children = [
    new D.Paragraph({
      border: { bottom: { style: D.BorderStyle.SINGLE, size: 16, color: GOLD, space: 2 } },
      spacing: { before: 0, after: 240 },
      children: [new D.TextRun({ text: 'XL-BYGG BERGE SAG', bold: true, size: 28, font: 'Arial', color: GOLD })]
    }),
    new D.Paragraph({
      spacing: { before: 0, after: 60 },
      children: [new D.TextRun({ text: 'BESKRIVELSE BYGGSETT', bold: true, size: 32, font: 'Arial', color: BLACK })]
    }),
    new D.Table({
      width: { size: CONTENT_W, type: D.WidthType.DXA },
      columnWidths: [Math.round(CONTENT_W*0.25), Math.round(CONTENT_W*0.75)],
      rows: [
        ['Prosjekt:', info.project],
        ['Kunde:', info.customer],
        ['Dato:', info.date],
        ['Selger:', info.seller],
      ].map(function(pair) {
        return new D.TableRow({ children: [
          new D.TableCell({ borders: noBorders, width: { size: Math.round(CONTENT_W*0.25), type: D.WidthType.DXA },
            children: [new D.Paragraph({ children: [new D.TextRun({ text: pair[0], bold: true, font: 'Arial', size: 20, color: BLACK })] })] }),
          new D.TableCell({ borders: noBorders, width: { size: Math.round(CONTENT_W*0.75), type: D.WidthType.DXA },
            children: [new D.Paragraph({ children: [new D.TextRun({ text: pair[1], font: 'Arial', size: 20, color: BLACK })] })] }),
        ]});
      })
    }),
    spacer(),
  ];

  for (const sec of sections) {
    if (sec.type === 'heading') children.push(heading(sec.text));
    else if (sec.type === 'optionHeading') children.push(optionHeading(sec.text));
    else if (sec.type === 'bullet') children.push(bullet(sec.text));
    else if (sec.type === 'overviewTable') {
      children.push(spacer());
      children.push(new D.Paragraph({
        spacing: { before: 200, after: 100 },
        border: { bottom: { style: D.BorderStyle.SINGLE, size: 8, color: GOLD, space: 4 } },

      }));
      children.push(spacer());

      for (const item of sec.items) {
        tblRows.push(tableRow(item.label, item.med ? 'X' : '', item.med ? '' : 'X', false));
      }
      children.push(new D.Table({ width: { size: CONTENT_W, type: D.WidthType.DXA }, columnWidths: [Math.round(CONTENT_W*0.55), Math.round(CONTENT_W*0.225), Math.round(CONTENT_W*0.225)], rows: tblRows }));
    }
  }

  children.push(spacer(), spacer());
  children.push(new D.Paragraph({
    spacing: { before: 120, after: 60 },
    border: { left: { style: D.BorderStyle.SINGLE, size: 16, color: GOLD, space: 8 } },
    indent: { left: 280 },
    children: [new D.TextRun({ text: 'Ved leveranse gjelder kun det som er beskrevet. Tilleggsleveranser avtales skriftlig. Pris kan justeres når endelige arbeidstegninger foreligger.', font: 'Arial', size: 18, italics: true, color: '555555' })]
  }));
  children.push(spacer(), spacer());
  children.push(new D.Table({
    width: { size: CONTENT_W, type: D.WidthType.DXA },
    columnWidths: [Math.round(CONTENT_W/2), Math.round(CONTENT_W/2)],
    rows: [new D.TableRow({ children: [
      new D.TableCell({ borders: noBorders, width: { size: Math.round(CONTENT_W/2), type: D.WidthType.DXA },
        children: [
          new D.Paragraph({ children: [new D.TextRun({ text: 'Ølensvåg, ' + info.date, font: 'Arial', size: 18, color: BLACK })] }),
          new D.Paragraph({ spacing: { before: 400 }, border: { bottom: { style: D.BorderStyle.SINGLE, size: 4, color: '999999', space: 2 } }, children: [new D.TextRun('')] }),
          new D.Paragraph({ children: [new D.TextRun({ text: info.customer, font: 'Arial', size: 18, color: BLACK })] }),
        ] }),
      new D.TableCell({ borders: noBorders, width: { size: Math.round(CONTENT_W/2), type: D.WidthType.DXA },
        children: [
          new D.Paragraph({ children: [new D.TextRun({ text: 'Ølensvåg, ' + info.date, font: 'Arial', size: 18, color: BLACK })] }),
          new D.Paragraph({ spacing: { before: 400 }, border: { bottom: { style: D.BorderStyle.SINGLE, size: 4, color: '999999', space: 2 } }, children: [new D.TextRun('')] }),
          new D.Paragraph({ children: [new D.TextRun({ text: 'XL-BYGG Berge Sag AS', font: 'Arial', size: 18, color: BLACK })] }),
        ] }),
    ]})]
  }));

  const doc = new D.Document({
    numbering: { config: [{ reference: 'bullets', levels: [{ level: 0, format: D.LevelFormat.BULLET, text: '\u2013', alignment: D.AlignmentType.LEFT,
      style: { paragraph: { indent: { left: 560, hanging: 280 } }, run: { font: 'Arial', color: GOLD } } }] }] },
    sections: [{ properties: { page: { size: { width: 11906, height: 16838 }, margin: { top: 1134, right: 1134, bottom: 1134, left: 1134 } } }, children: children }]
  });

  const blob = await D.Packer.toBlob(doc);
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = info.project + ' - Leveransebeskrivelse.docx';
  a.click();
  URL.revokeObjectURL(url);
}

function parseTextToSections(text) {
  const lines = text.split('\n');
  const sections = [];
  let inOverview = false;
  let overviewItems = [];

  for (const rawLine of lines) {
    let line = rawLine.trim();
    if (!line) continue;
    line = line.replace(/^#{1,6}\s*/, '');
    if (/^-{3,}$/.test(line)) continue;
    if (!line) continue;

    const cleanLine = line.replace(/\*/g, '').trim();

    if (/^oversikt/i.test(cleanLine)) {
      inOverview = true;
      overviewItems = [];
      continue;
    }

    if (inOverview) {
      if (/^MED:/i.test(cleanLine)) { overviewItems.push({ label: cleanLine.replace(/^MED:\s*/i,''), med: true }); continue; }
      if (/^IKKE MED:/i.test(cleanLine)) { overviewItems.push({ label: cleanLine.replace(/^IKKE MED:\s*/i,''), med: false }); continue; }
      if (/^[-–]\s/.test(line)) {
        const c = cleanLine.replace(/^[-–]\s+/,'');
        if (/^MED:/i.test(c)) { overviewItems.push({ label: c.replace(/^MED:\s*/i,''), med: true }); }
        else if (/^IKKE MED:/i.test(c)) { overviewItems.push({ label: c.replace(/^IKKE MED:\s*/i,''), med: false }); }
        else { overviewItems.push({ label: c, med: true }); }
        continue;
      }
      if (overviewItems.length > 0) {
        sections.push({ type: 'overviewTable', items: overviewItems });
        overviewItems = [];
        inOverview = false;
      }
    }

    if (/^[-–*]\s+/.test(line)) {
      sections.push({ type: 'bullet', text: line.replace(/^[-–*]\s+/,'').replace(/\*/g,'').trim() });
      continue;
    }

    const italicMatch = line.match(/^\*{3}(.+?)\*{3}\s*$/);
    if (italicMatch) {
      sections.push({ type: 'optionHeading', text: italicMatch[1].trim() });
      continue;
    }

    const boldMatch = line.match(/^\*\*(.+?)\*\*\s*$/);
    if (boldMatch) {
      const t = boldMatch[1].trim();
      if (/^opsjon\s+\d+:/i.test(t)) sections.push({ type: 'optionHeading', text: t });
      else sections.push({ type: 'heading', text: t });
      continue;
    }
  }

  if (overviewItems.length > 0) sections.push({ type: 'overviewTable', items: overviewItems });
  return sections;
}

  uploadZone.innerHTML = '<input type="file" id="fileInput" accept=".xlsx,.xls"><span class="upload-icon">&#128194;</span><div class="upload-title">Klikk eller dra Excel-fil hit</div><div class="upload-sub">.xlsx fra Smartkalk materialliste</div>';
  document.getElementById('fileInput').addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  hideStatus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

function showStatus(msg, type) { const el = document.getElementById('status'); el.textContent = msg; el.className = 'status ' + type; }
function hideStatus() { document.getElementById('status').className = 'status'; }
function setLoading(on) { const btn = document.getElementById('generateBtn'); btn.disabled = on; btn.textContent = on ? 'Genererer...' : 'Generer leveransebeskrivelse'; }
