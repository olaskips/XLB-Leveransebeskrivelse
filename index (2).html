<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leveransebeskrivelse — XL-BYGG Berge Sag</title>
<script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #C9A84C;
    --gold-light: #E8D5A0;
    --black: #111111;
    --off-white: #F7F6F3;
    --gray-1: #EEEDE9;
    --gray-2: #D0CEC8;
    --gray-3: #8A8880;
    --text: #1C1C1A;
    --radius: 6px;
  }

  body {
    font-family: 'Segoe UI', system-ui, sans-serif;
    background: var(--off-white);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  header {
    background: var(--black);
    padding: 18px 32px;
    display: flex;
    align-items: center;
    gap: 20px;
    border-bottom: 3px solid var(--gold);
  }

  header .logo-text {
    color: var(--gold);
    font-size: 20px;
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
  }

  header .logo-sub {
    color: var(--gray-2);
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .divider {
    width: 1px;
    height: 36px;
    background: var(--gray-3);
  }

  main {
    max-width: 820px;
    margin: 0 auto;
    padding: 36px 24px 60px;
  }

  .card {
    background: white;
    border-radius: var(--radius);
    border: 1px solid var(--gray-2);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .card-header {
    background: var(--black);
    color: var(--gold);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 20px;
  }

  .card-body {
    padding: 20px;
  }

  /* Upload zone */
  .upload-zone {
    border: 2px dashed var(--gray-2);
    border-radius: var(--radius);
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    background: var(--off-white);
  }

  .upload-zone:hover, .upload-zone.drag-over {
    border-color: var(--gold);
    background: #FBF8EF;
  }

  .upload-zone.done {
    border-color: #4A8C5C;
    background: #F0F7F2;
    cursor: default;
  }

  .upload-zone input { display: none; }

  .upload-icon {
    font-size: 32px;
    margin-bottom: 10px;
    display: block;
  }

  .upload-title {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .upload-sub {
    font-size: 13px;
    color: var(--gray-3);
  }

  /* Form grid */
  .form-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }

  .form-field label {
    display: block;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--gray-3);
    margin-bottom: 6px;
  }

  .form-field input {
    width: 100%;
    padding: 9px 12px;
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    font-size: 14px;
    font-family: inherit;
    color: var(--text);
    background: var(--off-white);
    transition: border-color 0.15s;
    outline: none;
  }

  .form-field input:focus {
    border-color: var(--gold);
    background: white;
  }

  /* Button */
  .btn-primary {
    width: 100%;
    padding: 13px 20px;
    background: var(--black);
    color: var(--gold);
    border: none;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.15s, color 0.15s;
    margin-top: 16px;
  }

  .btn-primary:hover:not(:disabled) {
    background: var(--gold);
    color: var(--black);
  }

  .btn-primary:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }

  .btn-secondary {
    padding: 8px 16px;
    background: transparent;
    color: var(--text);
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
  }

  .btn-secondary:hover {
    border-color: var(--gold);
    background: #FBF8EF;
  }

  /* Status */
  .status {
    display: none;
    padding: 12px 16px;
    border-radius: var(--radius);
    font-size: 13px;
    margin-top: 12px;
  }

  .status.loading {
    display: block;
    background: #EEF3FF;
    color: #3355AA;
    border: 1px solid #C0CFEE;
  }

  .status.error {
    display: block;
    background: #FFF0F0;
    color: #AA2222;
    border: 1px solid #EECCCC;
  }

  /* Result */
  .result-area {
    display: none;
  }

  .result-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 12px;
  }

  .result-toolbar span {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--gray-3);
  }

  .result-toolbar .actions {
    display: flex;
    gap: 8px;
  }

  .result-content {
    background: var(--off-white);
    border: 1px solid var(--gray-2);
    border-radius: var(--radius);
    padding: 24px;
    font-size: 14px;
    line-height: 1.75;
    white-space: pre-wrap;
    max-height: 560px;
    overflow-y: auto;
    color: var(--text);
    font-family: 'Segoe UI', system-ui, sans-serif;
  }

  /* Result formatting */
  .result-content .section-title {
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--black);
    border-bottom: 2px solid var(--gold);
    padding-bottom: 4px;
    margin: 20px 0 8px;
    display: block;
  }

  .result-content .section-title:first-child {
    margin-top: 0;
  }

  @media (max-width: 600px) {
    .form-grid { grid-template-columns: 1fr; }
    header { padding: 14px 16px; }
    main { padding: 20px 12px 40px; }
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">XL-BYGG Berge Sag</div>
    <div class="logo-sub">Leveransebeskrivelse</div>
  </div>
</header>

<main>

  <!-- STEG 1: Last opp -->
  <div class="card">
    <div class="card-header">Steg 1 — Last opp Smartkalk-kalkyle</div>
    <div class="card-body">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept=".xlsx,.xls">
        <span class="upload-icon">📂</span>
        <div class="upload-title">Klikk eller dra Excel-fil hit</div>
        <div class="upload-sub">.xlsx fra Smartkalk materialliste</div>
      </div>
    </div>
  </div>

  <!-- STEG 2: Prosjektinfo -->
  <div class="card" id="formCard" style="display:none;">
    <div class="card-header">Steg 2 — Prosjektinformasjon</div>
    <div class="card-body">
      <div class="form-grid">
        <div class="form-field">
          <label>Prosjektnavn</label>
          <input type="text" id="projectName" placeholder="f.eks. Kambo Anneks">
        </div>
        <div class="form-field">
          <label>Kunde</label>
          <input type="text" id="customerName" placeholder="Navn på kunde">
        </div>
        <div class="form-field">
          <label>Dato</label>
          <input type="text" id="projectDate">
        </div>
        <div class="form-field">
          <label>Selger</label>
          <input type="text" id="sellerName" placeholder="Navn på selger">
        </div>
      </div>
      <button class="btn-primary" id="generateBtn">Generer leveransebeskrivelse</button>
      <div class="status" id="status"></div>
    </div>
  </div>

  <!-- STEG 3: Resultat -->
  <div class="card result-area" id="resultArea">
    <div class="card-header">Leveransebeskrivelse</div>
    <div class="card-body">
      <div class="result-toolbar">
        <span>Ferdig generert</span>
        <div class="actions">
          <button class="btn-secondary" id="copyBtn">Kopier tekst</button>
          <button class="btn-secondary" id="resetBtn">Ny kalkyle</button>
        </div>
      </div>
      <div class="result-content" id="resultContent"></div>
    </div>
  </div>

</main>

<script>
// ── CONFIG ──────────────────────────────────────────────────
// Bytt ut denne URL-en med din Cloudflare Worker-URL etter deploy
const WORKER_URL = 'https://xlb-leveranse-proxy.olas.workers.dev';
// ────────────────────────────────────────────────────────────

let parsedRows = null;

// Upload-zone
const uploadZone = document.getElementById('uploadZone');
const fileInput  = document.getElementById('fileInput');

uploadZone.addEventListener('click', () => fileInput.click());
uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
uploadZone.addEventListener('drop', e => {
  e.preventDefault();
  uploadZone.classList.remove('drag-over');
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
});
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) handleFile(e.target.files[0]);
});

function handleFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const wb = XLSX.read(e.target.result, { type: 'array' });
      const ws = wb.Sheets[wb.SheetNames[0]];
      parsedRows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: '' });

      uploadZone.classList.add('done');
      uploadZone.innerHTML = `
        <span class="upload-icon">✅</span>
        <div class="upload-title">${file.name}</div>
        <div class="upload-sub">${parsedRows.length} rader lest</div>
      `;

      const today = new Date();
      document.getElementById('projectDate').value =
        String(today.getDate()).padStart(2,'0') + '.' +
        String(today.getMonth()+1).padStart(2,'0') + '.' +
        today.getFullYear();

      const nameGuess = file.name
        .replace(/\.[^/.]+$/, '')
        .replace(/[_]/g, ' ')
        .replace(/\s*\d{4}[\s._-]\d{2}[\s._-]\d{2}.*/,'')
        .trim();
      document.getElementById('projectName').value = nameGuess;

      document.getElementById('formCard').style.display = 'block';
      document.getElementById('formCard').scrollIntoView({ behavior: 'smooth', block: 'start' });
    } catch(err) {
      showStatus('Kunne ikke lese filen. Sjekk at det er en gyldig .xlsx fil.', 'error');
    }
  };
  reader.readAsArrayBuffer(file);
}

// Bygg Excel-sammendrag til prompt
function buildExcelSummary(rows) {
  const lines = [];
  for (const row of rows) {
    const c0 = String(row[0]||'').trim();
    const c1 = String(row[1]||'').trim();
    const c2 = String(row[2]||'').trim();
    const qty = row[3];
    const unit = String(row[4]||'').trim();
    if (!c0 && !c1) continue;
    if (/^\d+\./.test(c0) && !qty) { lines.push(`\n[${c0}]`); continue; }
    if (!c0 && /^\d+\./.test(c1) && !qty) { lines.push(`\n[${c1}]`); continue; }
    if (!c0 && c1 && (qty === '' || qty === undefined)) { lines.push(`  (${c1})`); continue; }
    if (c1 && qty !== '' && qty !== undefined) {
      const dim = c2 ? ` ${c2}` : '';
      lines.push(`  ${c1}${dim}: ${qty} ${unit}`);
    }
  }
  return lines.join('\n');
}

// Generer
document.getElementById('generateBtn').addEventListener('click', async () => {
  if (!parsedRows) return;

  const project  = document.getElementById('projectName').value || 'Ukjent prosjekt';
  const customer = document.getElementById('customerName').value || '–';
  const date     = document.getElementById('projectDate').value || '';
  const seller   = document.getElementById('sellerName').value || '–';

  const excelSummary = buildExcelSummary(parsedRows);

  const prompt = `Lag en profesjonell leveransebeskrivelse for byggsett på norsk bokmål.

PROSJEKT: ${project}
KUNDE: ${customer}
DATO: ${date}
SELGER: ${seller}

MATERIALLISTE FRA SMARTKALK:
${excelSummary}

INSTRUKSJONER:
- Organiser etter bygningsdeler: Bæresystem, Yttervegg, Innervegger, Dekker og gulv, Yttertak, Raft og takrenner, Ytterdører og vinduer, Innerdør og listverk, Spiker og beslag, Diverse
- Faglig men lesbart språk — ingen varenummer eller mengder
- Opsjoner samles i eget avsnitt til slutt
- Avslutt med oversikt: med / ikke med i leveransen
- Skriv slik en erfaren selger hos XL-BYGG ville formulert det
- Format: **Overskrift** på hvert avsnitt, bullet points med bindestrek`;

  setLoading(true);
  showStatus('Genererer leveransebeskrivelse...', 'loading');
  document.getElementById('resultArea').style.display = 'none';

  try {
    const response = await fetch(WORKER_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}`);

    const data = await response.json();
    const text = data.content?.[0]?.text;
    if (!text) throw new Error('Tomt svar fra AI');

    renderResult(text, project, customer, date, seller);
    hideStatus();
    document.getElementById('resultArea').style.display = 'block';
    document.getElementById('resultArea').scrollIntoView({ behavior: 'smooth', block: 'start' });

  } catch(err) {
    showStatus(`Noe gikk galt: ${err.message}. Sjekk at Worker-URL er riktig konfigurert.`, 'error');
  }

  setLoading(false);
});

function renderResult(text, project, customer, date, seller) {
  const header = `LEVERANSEBESKRIVELSE — ${project.toUpperCase()}\nKunde: ${customer}   |   Dato: ${date}   |   Selger: ${seller}\n${'─'.repeat(60)}\n\n`;

  const formatted = text
    .replace(/\*\*(.+?)\*\*/g, (_, m) => `\n${m.toUpperCase()}\n`)
    .replace(/^- /gm, '– ');

  document.getElementById('resultContent').textContent = header + formatted;
}

// Kopier
document.getElementById('copyBtn').addEventListener('click', () => {
  const text = document.getElementById('resultContent').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.getElementById('copyBtn');
    btn.textContent = 'Kopiert ✓';
    setTimeout(() => btn.textContent = 'Kopier tekst', 2000);
  });
});

// Reset
document.getElementById('resetBtn').addEventListener('click', () => {
  parsedRows = null;
  uploadZone.classList.remove('done');
  uploadZone.innerHTML = `
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <span class="upload-icon">📂</span>
    <div class="upload-title">Klikk eller dra Excel-fil hit</div>
    <div class="upload-sub">.xlsx fra Smartkalk materialliste</div>
  `;
  document.getElementById('fileInput').addEventListener('change', e => {
    if (e.target.files[0]) handleFile(e.target.files[0]);
  });
  uploadZone.addEventListener('click', () => document.getElementById('fileInput').click());
  document.getElementById('formCard').style.display = 'none';
  document.getElementById('resultArea').style.display = 'none';
  hideStatus();
  window.scrollTo({ top: 0, behavior: 'smooth' });
});

function showStatus(msg, type) {
  const el = document.getElementById('status');
  el.textContent = msg;
  el.className = `status ${type}`;
}

function hideStatus() {
  document.getElementById('status').className = 'status';
}

function setLoading(on) {
  const btn = document.getElementById('generateBtn');
  btn.disabled = on;
  btn.textContent = on ? 'Genererer...' : 'Generer leveransebeskrivelse';
}
</script>
</body>
</html>
